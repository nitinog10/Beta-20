<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatTrip AI 🇮🇳</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Leaflet for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }

        .animate-fade-in-up {
            animation: fade-in-up 0.5s ease-out forwards;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #4f46e5;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6366f1;
        }

        .leaflet-container {
            height: 500px;
            width: 100%;
            border-radius: 12px;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#b91c1c' },
                        secondary: { 500: '#f97316', 600: '#ea580c' }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans">
    <div id="root">
        <div
            style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
            <div style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 20px;">🇮🇳</div>
                <h2>Loading BharatTrip AI...</h2>
                <p style="color: #666;">Please wait while we initialize the application.</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Backend API Configuration
        const API_BASE = 'http://localhost:3001/api';

        console.log('React loaded successfully');
        console.log('Starting BharatTrip AI...');

        // Icons
        const icons = {
            Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
            Map: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>,
            Route: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>,
            Chat: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
            User: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
            Sun: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Moon: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>,
            Send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>,
            Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        };

        // Backend Status Hook
        function useBackendStatus() {
            const [isOnline, setIsOnline] = useState(false);

            useEffect(() => {
                const checkStatus = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/health`);
                        const data = await res.json();
                        setIsOnline(data.status === 'OK');
                    } catch (err) {
                        setIsOnline(false);
                    }
                };

                checkStatus();
                const interval = setInterval(checkStatus, 30000);
                return () => clearInterval(interval);
            }, []);

            return isOnline;
        }

        // Mock API for User Management (localStorage-based)
        const userApi = {
            async signup(firstName, lastName, email, password) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        const users = JSON.parse(localStorage.getItem('bharattrip_users')) || [];
                        if (users.find(user => user.email === email)) {
                            reject(new Error("User with this email already exists."));
                        } else {
                            const newUser = {
                                id: `user_${Date.now()}`,
                                firstName,
                                lastName,
                                email,
                                password,
                                preferences: null,
                                language: 'en',
                                photoUrl: null,
                                createdAt: new Date().toISOString()
                            };
                            users.push(newUser);
                            localStorage.setItem('bharattrip_users', JSON.stringify(users));
                            resolve(newUser);
                        }
                    }, 500);
                });
            },
            async login(email, password) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        const users = JSON.parse(localStorage.getItem('bharattrip_users')) || [];
                        const user = users.find(u => u.email === email && u.password === password);
                        if (user) {
                            resolve(user);
                        } else {
                            reject(new Error("Invalid email or password."));
                        }
                    }, 500);
                });
            },
            async updateUserProfile(userId, profileData) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        let users = JSON.parse(localStorage.getItem('bharattrip_users')) || [];
                        const userIndex = users.findIndex(u => u.id === userId);
                        if (userIndex !== -1) {
                            users[userIndex] = { ...users[userIndex], ...profileData };
                            localStorage.setItem('bharattrip_users', JSON.stringify(users));
                            resolve(users[userIndex]);
                        } else {
                            reject(new Error("User not found."));
                        }
                    }, 500);
                });
            }
        };

        // Toast Notification Component
        const Toast = ({ message, type, onDismiss }) => {
            const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
            useEffect(() => {
                const timer = setTimeout(onDismiss, 5000);
                return () => clearTimeout(timer);
            }, [onDismiss]);

            return (
                <div className={`fixed bottom-5 right-5 ${bgColor} text-white py-3 px-6 rounded-lg shadow-xl z-50 flex items-center animate-fade-in-up`}>
                    {type === 'success' ? '✓' : '✕'}
                    <span className="ml-3">{message}</span>
                    <button onClick={onDismiss} className="ml-4 font-bold">×</button>
                </div>
            );
        };

        // Login/Signup Component
        function LoginSignup({ onLoginSuccess, isDarkMode, setIsDarkMode }) {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ firstName: '', lastName: '', email: '', password: '', confirmPassword: '' });
            const [toast, setToast] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            const handleInputChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                setToast(null);
                if (isLogin) {
                    try {
                        const user = await userApi.login(formData.email, formData.password);
                        setToast({ message: 'Welcome back! 🎉', type: 'success' });
                        setTimeout(() => onLoginSuccess(user), 1500);
                    } catch (error) {
                        setToast({ message: error.message, type: 'error' });
                    }
                } else {
                    if (formData.password !== formData.confirmPassword) {
                        setToast({ message: "Passwords don't match.", type: 'error' });
                        setIsLoading(false);
                        return;
                    }
                    try {
                        const newUser = await userApi.signup(formData.firstName, formData.lastName, formData.email, formData.password);
                        setToast({ message: 'Account created successfully! Please log in.', type: 'success' });
                        setIsLogin(true);
                        setFormData({ firstName: '', lastName: '', email: '', password: '', confirmPassword: '' });
                    } catch (error) {
                        setToast({ message: error.message, type: 'error' });
                    }
                }
                setIsLoading(false);
            };

            return (
                <div className={`min-h-screen w-full flex items-center justify-center ${isDarkMode ? 'bg-gradient-to-br from-gray-900 via-blue-900 to-indigo-900' : 'bg-gradient-to-br from-blue-50 via-cyan-50 to-indigo-50'} p-4`}>
                    {toast && <Toast message={toast.message} type={toast.type} onDismiss={() => setToast(null)} />}
                    <div className={`${isDarkMode ? 'bg-gray-800/80 border-gray-700' : 'bg-white/90 border-white/80'} w-full max-w-md backdrop-blur-xl border rounded-3xl shadow-2xl p-8 transition-all duration-500`}>
                        <div className="text-center mb-6">
                            <h1 className={`text-4xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} mb-2`}>BharatTrip AI 🇮🇳</h1>
                            <p className={`${isDarkMode ? 'text-gray-400' : 'text-gray-600'}`}>Your AI-Powered Travel Companion</p>
                        </div>
                        <div className={`flex ${isDarkMode ? 'bg-gray-700' : 'bg-gray-100'} p-1 rounded-lg mb-6`}>
                            <button
                                onClick={() => setIsLogin(true)}
                                className={`w-1/2 p-2 rounded-md font-semibold transition-colors ${isLogin ? 'bg-blue-600 text-white' : `${isDarkMode ? 'text-gray-400 hover:bg-gray-600' : 'text-gray-600 hover:bg-gray-200'}`}`}
                            >
                                Sign In
                            </button>
                            <button
                                onClick={() => setIsLogin(false)}
                                className={`w-1/2 p-2 rounded-md font-semibold transition-colors ${!isLogin ? 'bg-indigo-600 text-white' : `${isDarkMode ? 'text-gray-400 hover:bg-gray-600' : 'text-gray-600 hover:bg-gray-200'}`}`}
                            >
                                Sign Up
                            </button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && (
                                <div className="flex space-x-4">
                                    <input
                                        type="text"
                                        name="firstName"
                                        placeholder="First Name"
                                        value={formData.firstName}
                                        onChange={handleInputChange}
                                        className={`w-1/2 ${isDarkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-gray-50 text-gray-900 border-gray-300'} border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none`}
                                        required
                                    />
                                    <input
                                        type="text"
                                        name="lastName"
                                        placeholder="Last Name"
                                        value={formData.lastName}
                                        onChange={handleInputChange}
                                        className={`w-1/2 ${isDarkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-gray-50 text-gray-900 border-gray-300'} border rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none`}
                                        required
                                    />
                                </div>
                            )}
                            <input
                                type="email"
                                name="email"
                                placeholder="Email"
                                value={formData.email}
                                onChange={handleInputChange}
                                className={`w-full ${isDarkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-gray-50 text-gray-900 border-gray-300'} border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none`}
                                required
                            />
                            <input
                                type="password"
                                name="password"
                                placeholder="Password"
                                value={formData.password}
                                onChange={handleInputChange}
                                className={`w-full ${isDarkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-gray-50 text-gray-900 border-gray-300'} border rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none`}
                                required
                            />
                            {!isLogin && (
                                <input
                                    type="password"
                                    name="confirmPassword"
                                    placeholder="Confirm Password"
                                    value={formData.confirmPassword}
                                    onChange={handleInputChange}
                                    className={`w-full ${isDarkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-gray-50 text-gray-900 border-gray-300'} border rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none`}
                                    required
                                />
                            )}
                            <button
                                type="submit"
                                disabled={isLoading}
                                className="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-3 rounded-xl transition-all duration-300 shadow-lg hover:shadow-blue-500/30 disabled:opacity-50 flex items-center justify-center"
                            >
                                {isLoading ? (
                                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                ) : (
                                    isLogin ? 'Sign In' : 'Create Account'
                                )}
                            </button>
                        </form>
                        <div className="mt-6 flex justify-center">
                            <button
                                onClick={() => setIsDarkMode(!isDarkMode)}
                                className={`p-2 rounded-full ${isDarkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-100'}`}
                            >
                                {isDarkMode ? '☀️' : '🌙'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Onboarding Quiz Component
        function OnboardingQuiz({ user, onComplete, isDarkMode }) {
            const [step, setStep] = useState(1);
            const [preferences, setPreferences] = useState({ style: '', interests: [], pace: '', budget: '' });

            const handleSelect = (key, value) => {
                if (key === 'interests') {
                    setPreferences(p => ({
                        ...p,
                        interests: p.interests.includes(value)
                            ? p.interests.filter(i => i !== value)
                            : [...p.interests, value]
                    }));
                } else {
                    setPreferences(p => ({ ...p, [key]: value }));
                }
            };

            const nextStep = () => setStep(s => s + 1);
            const prevStep = () => setStep(s => s - 1);

            const handleSubmit = async () => {
                try {
                    await userApi.updateUserProfile(user.id, { preferences });
                    onComplete(preferences);
                } catch (error) {
                    console.error("Failed to save preferences:", error);
                }
            };

            const renderStep = () => {
                switch (step) {
                    case 1: return (
                        <div>
                            <h3 className={`text-2xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} mb-4`}>What's your travel style? 🎯</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {['Adventure', 'Relaxation', 'Cultural', 'Luxury', 'Budget', 'Family'].map(style => (
                                    <button
                                        key={style}
                                        onClick={() => { handleSelect('style', style); nextStep(); }}
                                        className={`p-6 rounded-xl font-semibold transition-all duration-300 ${preferences.style === style ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white ring-2 ring-blue-400 shadow-lg' : `${isDarkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-100 text-gray-800 hover:bg-gray-200'}`}`}
                                    >
                                        {style}
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                    case 2: return (
                        <div>
                            <h3 className={`text-2xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} mb-4`}>What are your interests? 🎨</h3>
                            <p className={`${isDarkMode ? 'text-gray-400' : 'text-gray-600'} mb-6`}>Select all that apply.</p>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {['History', 'Food', 'Nature', 'Art', 'Nightlife', 'Shopping', 'Sports', 'Wellness'].map(interest => (
                                    <button
                                        key={interest}
                                        onClick={() => handleSelect('interests', interest)}
                                        className={`p-4 rounded-xl font-semibold transition-all duration-300 ${preferences.interests.includes(interest) ? 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white ring-2 ring-indigo-400 shadow-lg' : `${isDarkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-100 text-gray-800 hover:bg-gray-200'}`}`}
                                    >
                                        {interest}
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                    case 3: return (
                        <div>
                            <h3 className={`text-2xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} mb-4`}>What's your preferred trip pace? ⚡</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {['Fast-Paced', 'Balanced', 'Slow'].map(pace => (
                                    <button
                                        key={pace}
                                        onClick={() => handleSelect('pace', pace)}
                                        className={`p-6 rounded-xl font-semibold transition-all duration-300 ${preferences.pace === pace ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white ring-2 ring-cyan-400 shadow-lg' : `${isDarkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-100 text-gray-800 hover:bg-gray-200'}`}`}
                                    >
                                        {pace}
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                    case 4: return (
                        <div>
                            <h3 className={`text-2xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} mb-4`}>What's your budget preference? 💰</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {['Budget-Friendly', 'Mid-Range', 'Premium'].map(budget => (
                                    <button
                                        key={budget}
                                        onClick={() => handleSelect('budget', budget)}
                                        className={`p-6 rounded-xl font-semibold transition-all duration-300 ${preferences.budget === budget ? 'bg-gradient-to-r from-green-500 to-emerald-500 text-white ring-2 ring-green-400 shadow-lg' : `${isDarkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-100 text-gray-800 hover:bg-gray-200'}`}`}
                                    >
                                        {budget}
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                    default: return null;
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className={`${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200'} backdrop-blur-lg border rounded-3xl p-8 w-full max-w-2xl animate-fade-in-up shadow-2xl`}>
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h2 className={`text-3xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'}`}>Personalize Your Experience ✨</h2>
                                <p className={isDarkMode ? 'text-gray-400' : 'text-gray-600'}>Help us tailor your perfect trips.</p>
                            </div>
                            <div className={`${isDarkMode ? 'text-white' : 'text-gray-800'} font-bold text-lg`}>{step} / 4</div>
                        </div>
                        <div className="mb-2">
                            <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                                <div className="bg-gradient-to-r from-blue-500 to-cyan-500 h-2 rounded-full transition-all duration-300" style={{ width: `${(step / 4) * 100}%` }}></div>
                            </div>
                        </div>
                        <div className="mb-8 min-h-[200px]">
                            {renderStep()}
                        </div>
                        <div className="flex justify-between items-center">
                            <button
                                onClick={prevStep}
                                disabled={step === 1}
                                className={`${isDarkMode ? 'bg-gray-600 hover:bg-gray-500 text-white' : 'bg-gray-300 hover:bg-gray-400 text-gray-800'} font-bold py-2 px-4 rounded-xl transition-colors disabled:opacity-50`}
                            >
                                ← Back
                            </button>
                            {step < 4 && (
                                <button
                                    onClick={nextStep}
                                    disabled={(step === 1 && !preferences.style) || (step === 2 && preferences.interests.length === 0) || (step === 3 && !preferences.pace)}
                                    className="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-2 px-6 rounded-xl transition-all shadow-lg hover:shadow-blue-500/30 disabled:opacity-50"
                                >
                                    Next →
                                </button>
                            )}
                            {step === 4 && (
                                <button
                                    onClick={handleSubmit}
                                    disabled={!preferences.budget}
                                    className="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-2 px-6 rounded-xl transition-all shadow-lg hover:shadow-purple-500/30 disabled:opacity-50 flex items-center justify-center"
                                >
                                    ✨ Finish Setup
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // AI Trip Planner Components
        const AITripPlanner = ({ user, isDarkMode }) => {
            const [view, setView] = useState('form');
            const [itinerary, setItinerary] = useState(null);
            const [error, setError] = useState(null);
            const [lastPlanRequest, setLastPlanRequest] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            const handlePlanRequest = async (planRequest) => {
                setView('loading');
                setItinerary(null);
                setError(null);
                setLastPlanRequest(planRequest);
                setIsLoading(true);

                try {
                    const result = await generateItinerary(planRequest);
                    setItinerary(result);
                    setView('itinerary');
                } catch (err) {
                    const errorMessage = err.message || 'Sorry, we couldn\'t generate your itinerary. Please try again later.';
                    setError(errorMessage);
                    setView('error');
                    console.error(err);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleItineraryUpdate = (update) => {
                setItinerary(currentItinerary => {
                    if (!currentItinerary) return null;

                    const newDailyPlan = [...currentItinerary.dailyPlan];
                    const dayToUpdate = { ...newDailyPlan[update.dayIndex] };
                    const newActivities = [...dayToUpdate.activities];
                    newActivities[update.activityIndex] = update.newActivity;
                    dayToUpdate.activities = newActivities;
                    newDailyPlan[update.dayIndex] = dayToUpdate;

                    return { ...currentItinerary, dailyPlan: newDailyPlan };
                });
            };

            const startOver = () => {
                setView('form');
                setItinerary(null);
                setError(null);
            };

            return (
                <div className={`min-h-screen ${isDarkMode ? 'bg-gradient-to-br from-gray-900 via-blue-900 to-indigo-900' : 'bg-gradient-to-br from-blue-50 via-cyan-50 to-indigo-50'} text-slate-200 flex flex-col items-center`}>
                    <div className="flex-grow flex flex-col items-center justify-center p-4 sm:p-8 w-full">
                        {view === 'form' && <PlannerForm onPlanRequest={handlePlanRequest} isDarkMode={isDarkMode} />}
                        {view === 'loading' && <LoadingView />}
                        {view === 'itinerary' && itinerary && (
                            <ItineraryView
                                itinerary={itinerary}
                                planRequest={lastPlanRequest}
                                onItineraryUpdate={handleItineraryUpdate}
                                onNewSearch={startOver}
                                isDarkMode={isDarkMode}
                            />
                        )}
                        {view === 'error' && <ErrorView error={error} onRetry={startOver} isDarkMode={isDarkMode} />}
                    </div>
                </div>
            );
        };

        const PlannerForm = ({ onPlanRequest, isDarkMode }) => {
            const [planType, setPlanType] = useState('Single Destination');
            const [destination, setDestination] = useState('');
            const [selectedInterests, setSelectedInterests] = useState(new Set());
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [selectedBudget, setSelectedBudget] = useState('Medium');
            const [selectedTravelMode, setSelectedTravelMode] = useState('Train');

            const interests = ['Heritage', 'Nature', 'Food', 'Adventure', 'Wellness', 'Culture'];
            const budgets = ['Low', 'Medium', 'Premium'];
            const travelModes = ['Train', 'Flight', 'Bus', 'Self-Drive'];

            const toggleInterest = (interest) => {
                setSelectedInterests(current => {
                    const newSet = new Set(current);
                    if (newSet.has(interest)) {
                        newSet.delete(interest);
                    } else {
                        newSet.add(interest);
                    }
                    return newSet;
                });
            };

            const isFormValid = () => {
                return destination && startDate && endDate && selectedInterests.size > 0;
            };

            const generateItinerary = () => {
                if (!isFormValid()) {
                    alert('Please fill all required fields: Destination, Interests, Start Date, and End Date.');
                    return;
                }
                onPlanRequest({
                    destination,
                    interests: Array.from(selectedInterests),
                    startDate,
                    endDate,
                    budget: selectedBudget,
                    travelMode: selectedTravelMode,
                });
            };

            const getInterestIcon = (interest) => {
                const iconMap = {
                    'Heritage': 'fa-solid fa-landmark',
                    'Nature': 'fa-solid fa-leaf',
                    'Food': 'fa-solid fa-utensils',
                    'Adventure': 'fa-solid fa-person-hiking',
                    'Wellness': 'fa-solid fa-spa',
                    'Culture': 'fa-solid fa-masks-theater'
                };
                return iconMap[interest] || 'fa-solid fa-star';
            };

            const getTravelModeIcon = (mode) => {
                const iconMap = {
                    'Train': 'fa fa-train',
                    'Flight': 'fa fa-plane',
                    'Bus': 'fa fa-bus',
                    'Self-Drive': 'fa fa-car'
                };
                return iconMap[mode] || 'fa fa-car';
            };

            return (
                <div className="w-full max-w-4xl mx-auto">
                    <div className="text-center mb-8">
                        <h2 className={`text-4xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} flex items-center justify-center`}>
                            <span className="text-5xl mr-3">🤖</span> AI Trip Planner
                        </h2>
                        <p className={`${isDarkMode ? 'text-slate-400' : 'text-gray-600'} mt-2`}>Create your perfect Indian travel itinerary powered by AI</p>
                    </div>

                    <div className="flex justify-center mb-8">
                        <div className={`${isDarkMode ? 'bg-slate-800' : 'bg-gray-200'} rounded-lg p-1 flex space-x-1`}>
                            <button
                                onClick={() => setPlanType('Single Destination')}
                                className={`px-6 py-2 rounded-md font-semibold transition-colors duration-200 ${planType === 'Single Destination'
                                        ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white'
                                        : `${isDarkMode ? 'text-slate-300 hover:bg-slate-700' : 'text-gray-600 hover:bg-gray-300'}`
                                    }`}
                            >
                                <i className="fa-solid fa-map-marker-alt mr-2"></i>Single Destination
                            </button>
                            <button
                                onClick={() => setPlanType('Multi-City Plan')}
                                className={`px-6 py-2 rounded-md font-semibold transition-colors duration-200 ${planType === 'Multi-City Plan'
                                        ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white'
                                        : `${isDarkMode ? 'text-slate-300 hover:bg-slate-700' : 'text-gray-600 hover:bg-gray-300'}`
                                    }`}
                            >
                                <i className="fa-solid fa-route mr-2"></i>Multi-City Plan
                            </button>
                        </div>
                    </div>

                    <div className={`${isDarkMode ? 'bg-slate-800/80 border-slate-700/50' : 'bg-white/90 border-gray-200'} backdrop-blur-sm border rounded-2xl p-8 shadow-2xl`}>
                        <div className="space-y-8">
                            {/* Destination */}
                            <div>
                                <label className={`block text-sm font-semibold ${isDarkMode ? 'text-slate-300' : 'text-gray-700'} mb-2`}>
                                    <i className="fa-solid fa-location-dot text-red-400 mr-2"></i>DESTINATION
                                </label>
                                <input
                                    type="text"
                                    value={destination}
                                    onChange={(e) => setDestination(e.target.value)}
                                    placeholder="e.g., Jaipur, Kerala, Goa, Varanasi..."
                                    className={`w-full ${isDarkMode ? 'bg-slate-700/50 border-slate-600 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'} border rounded-lg p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 outline-none transition`}
                                />
                            </div>

                            {/* Interests */}
                            <div>
                                <label className={`block text-sm font-semibold ${isDarkMode ? 'text-slate-300' : 'text-gray-700'} mb-2`}>
                                    <i className="fa-solid fa-heart text-pink-400 mr-2"></i>INTERESTS
                                </label>
                                <div className="grid grid-cols-3 sm:grid-cols-6 gap-3">
                                    {interests.map(interest => (
                                        <button
                                            key={interest}
                                            onClick={() => toggleInterest(interest)}
                                            className={`flex flex-col items-center justify-center p-3 rounded-lg font-medium transition-all duration-300 hover:-translate-y-1 hover:shadow-lg ${selectedInterests.has(interest)
                                                    ? `${isDarkMode ? 'bg-slate-600' : 'bg-blue-100'} ring-2 ring-cyan-400 ${isDarkMode ? 'text-white' : 'text-blue-900'}`
                                                    : `${isDarkMode ? 'bg-slate-700/50 text-slate-300 hover:bg-slate-700' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`
                                                }`}
                                        >
                                            <i className={`text-2xl mb-2 ${getInterestIcon(interest)}`}></i>
                                            <span className="text-sm">{interest}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Dates */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className={`block text-sm font-semibold ${isDarkMode ? 'text-slate-300' : 'text-gray-700'} mb-2`}>
                                        <i className="fa-solid fa-calendar-alt text-blue-400 mr-2"></i>START DATE
                                    </label>
                                    <input
                                        type="date"
                                        value={startDate}
                                        onChange={(e) => setStartDate(e.target.value)}
                                        className={`w-full ${isDarkMode ? 'bg-slate-700/50 border-slate-600 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'} border rounded-lg p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 outline-none transition appearance-none`}
                                        style={{ colorScheme: isDarkMode ? 'dark' : 'light' }}
                                    />
                                </div>
                                <div>
                                    <label className={`block text-sm font-semibold ${isDarkMode ? 'text-slate-300' : 'text-gray-700'} mb-2`}>
                                        <i className="fa-solid fa-calendar-alt text-blue-400 mr-2"></i>END DATE
                                    </label>
                                    <input
                                        type="date"
                                        value={endDate}
                                        onChange={(e) => setEndDate(e.target.value)}
                                        className={`w-full ${isDarkMode ? 'bg-slate-700/50 border-slate-600 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'} border rounded-lg p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 outline-none transition appearance-none`}
                                        style={{ colorScheme: isDarkMode ? 'dark' : 'light' }}
                                    />
                                </div>
                            </div>

                            {/* Budget & Travel Mode */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <label className={`block text-sm font-semibold ${isDarkMode ? 'text-slate-300' : 'text-gray-700'} mb-2`}>
                                        <i className="fa-solid fa-wallet text-yellow-400 mr-2"></i>BUDGET
                                    </label>
                                    <div className="grid grid-cols-3 gap-3">
                                        {budgets.map(budget => (
                                            <button
                                                key={budget}
                                                onClick={() => setSelectedBudget(budget)}
                                                className={`p-3 rounded-lg font-medium transition-colors duration-200 ${selectedBudget === budget
                                                        ? 'bg-blue-600 text-white'
                                                        : `${isDarkMode ? 'bg-slate-700/50 text-slate-300 hover:bg-slate-700' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`
                                                    }`}
                                            >
                                                {budget}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className={`block text-sm font-semibold ${isDarkMode ? 'text-slate-300' : 'text-gray-700'} mb-2`}>
                                        <i className="fa-solid fa-map-signs text-green-400 mr-2"></i>TRAVEL MODE
                                    </label>
                                    <div className="grid grid-cols-2 gap-3">
                                        {travelModes.map(mode => (
                                            <button
                                                key={mode}
                                                onClick={() => setSelectedTravelMode(mode)}
                                                className={`p-3 rounded-lg font-medium transition-colors duration-200 flex items-center justify-center ${selectedTravelMode === mode
                                                        ? 'bg-blue-600 text-white'
                                                        : `${isDarkMode ? 'bg-slate-700/50 text-slate-300 hover:bg-slate-700' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`
                                                    }`}
                                            >
                                                <i className={`${getTravelModeIcon(mode)} mr-2`}></i>
                                                {mode}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Submit Button */}
                        <div className="mt-10">
                            <button
                                onClick={generateItinerary}
                                disabled={!isFormValid()}
                                className="w-full bg-gradient-to-r from-blue-500 to-cyan-400 hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 px-4 rounded-lg text-lg transition-all duration-300 transform hover:scale-105"
                            >
                                ✨ Generate Smart Itinerary <i className="fa fa-arrow-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const LoadingView = () => (
            <div className="flex flex-col items-center justify-center text-center">
                <div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-cyan-400 mb-4"></div>
                <h2 className="text-2xl font-bold text-white mb-2">Crafting Your Perfect Journey...</h2>
                <p className="text-slate-400">Our AI is exploring the best options for you. Please wait a moment.</p>
            </div>
        );

        const ErrorView = ({ error, onRetry, isDarkMode }) => (
            <div className={`text-center ${isDarkMode ? 'bg-slate-800' : 'bg-white'} p-8 rounded-lg max-w-lg`}>
                <i className="fa fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                <h2 className={`text-2xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} mb-2`}>Oops! Something went wrong.</h2>
                <p className={`${isDarkMode ? 'text-slate-400' : 'text-gray-600'} mb-6`}>{error}</p>
                <button
                    onClick={onRetry}
                    className="bg-gradient-to-r from-blue-500 to-cyan-500 hover:opacity-90 text-white font-bold py-2 px-6 rounded-lg transition-opacity"
                >
                    Try Again
                </button>
            </div>
        );

        const ItineraryView = ({ itinerary, planRequest, onItineraryUpdate, onNewSearch, isDarkMode }) => {
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [isBotThinking, setIsBotThinking] = useState(false);
            const [userInput, setUserInput] = useState('');
            const [modificationContext, setModificationContext] = useState(null);

            const openChatForModification = (dayIndex, activityIndex, activity) => {
                setModificationContext({ dayIndex, activityIndex, activity });
                setChatMessages([
                    { sender: 'bot', text: `You want to change the activity "${activity.name}". What would you like to do instead?` }
                ]);
                setIsChatOpen(true);
            };

            const sendChatMessage = async () => {
                const messageText = userInput.trim();
                if (!messageText || isBotThinking) return;

                setChatMessages(m => [...m, { sender: 'user', text: messageText }]);
                setUserInput('');
                setIsBotThinking(true);

                if (modificationContext) {
                    try {
                        const dayPlan = itinerary.dailyPlan[modificationContext.dayIndex];
                        const alternatives = await getAlternativeActivities(dayPlan, messageText, planRequest.destination, planRequest.interests);
                        setChatMessages(m => [...m,
                        { sender: 'bot', text: 'Here are a few alternatives:' },
                        { sender: 'options', options: alternatives }
                        ]);
                    } catch (error) {
                        console.error(error);
                        setChatMessages(m => [...m, { sender: 'bot', text: 'I had trouble finding alternatives. Please try again.' }]);
                    } finally {
                        setIsBotThinking(false);
                    }
                }
            };

            const selectAlternative = (alternative) => {
                if (modificationContext) {
                    onItineraryUpdate({
                        dayIndex: modificationContext.dayIndex,
                        activityIndex: modificationContext.activityIndex,
                        newActivity: alternative
                    });
                    closeChat();
                }
            };

            const closeChat = () => {
                setIsChatOpen(false);
                setUserInput('');
                setModificationContext(null);
            };

            return (
                <div className="w-full max-w-5xl mx-auto animate-fade-in">
                    {/* Itinerary Header */}
                    <div className={`${isDarkMode ? 'bg-slate-800/80 border-slate-700/50' : 'bg-white/90 border-gray-200'} backdrop-blur-sm border rounded-2xl p-6 sm:p-8 mb-8 shadow-lg flex justify-between items-center`}>
                        <h2 className={`text-3xl sm:text-4xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} leading-tight`}>{itinerary.title}</h2>
                        <button
                            onClick={onNewSearch}
                            className={`${isDarkMode ? 'bg-slate-700 hover:bg-slate-600' : 'bg-gray-200 hover:bg-gray-300'} ${isDarkMode ? 'text-white' : 'text-gray-800'} font-bold py-2 px-4 rounded-lg transition-colors text-sm whitespace-nowrap flex-shrink-0`}
                        >
                            <i className="fa-solid fa-search mr-2"></i>New Search
                        </button>
                    </div>

                    {/* Timeline Itinerary */}
                    <div className="relative pl-4 sm:pl-8 pt-4">
                        {/* The timeline vertical bar */}
                        <div className={`absolute left-8 top-2 bottom-2 w-0.5 ${isDarkMode ? 'bg-slate-700' : 'bg-gray-300'} rounded-full`}></div>

                        {itinerary.dailyPlan.map((day, dayIndex) => (
                            <div key={day.day} className="relative mb-12">
                                {/* Day marker on the timeline */}
                                <div className={`absolute -left-1 sm:-left-3.5 top-1.5 w-10 h-10 ${isDarkMode ? 'bg-slate-700 border-slate-900' : 'bg-gray-300 border-white'} border-4 rounded-full flex items-center justify-center font-bold text-cyan-400`}>
                                    {day.day}
                                </div>

                                <div className="ml-12">
                                    <h4 className={`text-2xl font-bold ${isDarkMode ? 'text-white' : 'text-gray-900'} pt-2`}>
                                        Day {day.day}: {day.title}
                                    </h4>

                                    <div className="mt-6 space-y-6">
                                        {day.activities.map((activity, activityIndex) => (
                                            <div key={activity.name} className={`${isDarkMode ? 'bg-slate-800/60 border-slate-700/50 hover:border-cyan-500/50 hover:shadow-cyan-950/50' : 'bg-white/80 border-gray-200 hover:border-cyan-400/50 hover:shadow-cyan-200/50'} border rounded-xl p-5 group transition-all duration-300 hover:shadow-2xl`}>
                                                <div className="flex justify-between items-start">
                                                    <h5 className={`text-xl font-semibold ${isDarkMode ? 'text-slate-100' : 'text-gray-900'}`}>{activity.name}</h5>
                                                    <button
                                                        onClick={() => openChatForModification(dayIndex, activityIndex, activity)}
                                                        className={`text-sm ${isDarkMode ? 'bg-slate-700 hover:bg-cyan-600 text-slate-300' : 'bg-gray-200 hover:bg-cyan-500 text-gray-700'} hover:text-white font-semibold py-1 px-3 rounded-full transition-all duration-300 opacity-50 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0`}
                                                    >
                                                        <i className="fa-solid fa-edit mr-1"></i> Change
                                                    </button>
                                                </div>
                                                <p className={`${isDarkMode ? 'text-slate-400' : 'text-gray-600'} mt-1 mb-3 text-sm`}>{activity.description}</p>
                                                <div className={`${isDarkMode ? 'bg-slate-900/50' : 'bg-gray-50'} border-l-4 border-cyan-500 rounded-r-lg p-3 text-sm`}>
                                                    <p className={`${isDarkMode ? 'text-slate-300' : 'text-gray-700'}`}>
                                                        <strong className="font-semibold text-cyan-400">Reason to Visit:</strong> {activity.reason}
                                                    </p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Chatbot Modal */}
                    {isChatOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 animate-fade-in" onClick={closeChat}>
                            <div onClick={(e) => e.stopPropagation()} className={`${isDarkMode ? 'bg-slate-800 border-cyan-500/50' : 'bg-white border-cyan-400/50'} w-full max-w-md rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col h-[80vh] sm:h-[70vh] m-0 sm:m-4 border-t-2 sm:border-2`}>
                                <header className={`p-4 ${isDarkMode ? 'border-slate-700' : 'border-gray-200'} border-b flex justify-between items-center flex-shrink-0`}>
                                    <h3 className={`font-bold text-lg flex items-center ${isDarkMode ? 'text-white' : 'text-gray-900'}`}>
                                        <i className="fa-solid fa-robot text-cyan-400 mr-2"></i>AI Itinerary Assistant
                                    </h3>
                                    <button onClick={closeChat} className={`${isDarkMode ? 'text-slate-400 hover:text-white' : 'text-gray-400 hover:text-gray-600'} text-2xl`}>&times;</button>
                                </header>

                                <div className="flex-grow p-4 overflow-y-auto space-y-4">
                                    {chatMessages.map((message, index) => (
                                        <div key={index}>
                                            {message.sender === 'bot' && (
                                                <div className="flex justify-start">
                                                    <div className={`${isDarkMode ? 'bg-slate-700' : 'bg-gray-200'} rounded-lg p-3 max-w-xs animate-fade-in`}>
                                                        <p className={`text-sm ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>{message.text}</p>
                                                    </div>
                                                </div>
                                            )}
                                            {message.sender === 'user' && (
                                                <div className="flex justify-end">
                                                    <div className="bg-blue-600 text-white rounded-lg p-3 max-w-xs animate-fade-in">
                                                        <p className="text-sm">{message.text}</p>
                                                    </div>
                                                </div>
                                            )}
                                            {message.sender === 'options' && message.options && (
                                                <div>
                                                    <div className="relative my-4 animate-fade-in">
                                                        <div className="absolute inset-0 flex items-center" aria-hidden="true">
                                                            <div className={`w-full border-t ${isDarkMode ? 'border-slate-700' : 'border-gray-300'}`}></div>
                                                        </div>
                                                        <div className="relative flex justify-center">
                                                            <span className={`${isDarkMode ? 'bg-slate-800 text-slate-400' : 'bg-white text-gray-500'} px-3 text-xs font-semibold uppercase tracking-wider`}>Suggestions</span>
                                                        </div>
                                                    </div>

                                                    <div className="space-y-2 animate-fade-in">
                                                        {message.options.map((option, optionIndex) => (
                                                            <div
                                                                key={optionIndex}

                                                                className={`w-full text-left ${isDarkMode ? 'bg-slate-700/70 hover:bg-slate-700 hover:border-cyan-500/50' : 'bg-gray-100 hover:bg-gray-200 hover:border-cyan-400/50'} border border-transparent rounded-lg p-3 transition-all duration-200 cursor-pointer flex items-start gap-3 group`}
                                                            >
                                                                <div className={`flex-shrink-0 h-10 w-10 ${isDarkMode ? 'bg-slate-900/50 group-hover:bg-cyan-900/50' : 'bg-gray-200 group-hover:bg-cyan-100'} text-cyan-400 rounded-lg flex items-center justify-center transition-colors`}>
                                                                    <i className="fa-solid fa-location-arrow"></i>
                                                                </div>
                                                                <div>
                                                                    <p className={`font-semibold text-cyan-400 group-hover:text-cyan-300 transition-colors`}>{option.name}</p>
                                                                    <p className={`text-xs ${isDarkMode ? 'text-slate-300' : 'text-gray-600'} mt-1`}>{option.description}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {isBotThinking && (
                                        <div className="flex">
                                            <div className={`${isDarkMode ? 'bg-slate-700' : 'bg-gray-200'} rounded-lg p-3 max-w-xs flex items-center space-x-2`}>

                    { name: "Dilli Haat", description: "Cultural and craft market", reason: "Experience diverse Indian handicrafts and regional cuisines under one roof" }
                ]
            };

            const dailyPlan = [];
            for (let day = 1; day <= duration; day++) {
                const dayActivities = [];
                interests.forEach(interest => {
                    if (mockActivities[interest]) {
                        const activity = mockActivities[interest][Math.floor(Math.random() * mockActivities[interest].length)];
                        dayActivities.push(activity);

                // Ensure at least 2 activities per day
                while (dayActivities.length < 2) {
                    const allActivities = Object.values(mockActivities).flat();

                    title: `Exploring ${destination}`,
                    activities: dayActivities.slice(0, 3) // Limit to 3 activities per day

                                        <div className="relative overflow-hidden">
                                            <img
                                                src={dest.img}
                                                alt={dest.name}

                                        <div className="p-4">
                                            <h5 className="font-bold text-sm dark:text-white mb-1">{dest.name}</h5>

                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                                </svg>
                                                View Map
                                            </button>
                                        </div>
                                    </div>
                                ))}

                        </div>
                    )}
                </div>

                {/* Hidden Gems */}
                <div>
                    <div className="flex items-center justify-between mb-6">
                        <h3 className="text-3xl font-bold dark:text-white">💎 Discover Hidden Gems</h3>
                        <p className="text-sm text-gray-500 dark:text-gray-400 hidden md:block">Off the beaten path</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[
                            { name: 'Hampi Caves', desc: 'Ancient ruins & boulders', img: 'https://images.unsplash.com/photo-1599661046289-e31897846e41?w=400' },
                            { name: 'Ziro Valley', desc: 'Pine hills & Apatani culture', img: 'ziro.png' },
                            { name: 'Orchha', desc: 'Medieval palaces', img: 'https://images.unsplash.com/photo-1582510003544-4d00b7f74220?w=400' },
                            { name: 'Majuli Island', desc: 'World\'s largest river island', img: 'image.png' }
                        ].map((gem, idx) => (
                            <div
                                key={idx}
                                className="group bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 border border-gray-100 dark:border-gray-700"
