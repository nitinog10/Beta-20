<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatTrip AI</title>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const [currentPage, setCurrentPage] = React.useState('home');
            
            const Navigation = () => (
                <nav className="bg-slate-800 p-4">
                    <div className="container mx-auto flex gap-4">
                        <button 
                            onClick={() => setCurrentPage('home')}
                            className={`px-4 py-2 rounded ${currentPage === 'home' ? 'bg-blue-600 text-white' : 'text-gray-300'}`}
                        >
                            <i className="fas fa-home mr-2"></i>Home
                        </button>
                        <button 
                            onClick={() => setCurrentPage('planner')}
                            className={`px-4 py-2 rounded ${currentPage === 'planner' ? 'bg-blue-600 text-white' : 'text-gray-300'}`}
                        >
                            <i className="fas fa-map-marked-alt mr-2"></i>Trip Planner
                        </button>
                    </div>
                </nav>
            );

            const HomePage = () => (
                <div className="container mx-auto p-8">
                    <h1 className="text-4xl font-bold text-white mb-4">Welcome to BharatTrip AI</h1>
                    <p className="text-gray-300 mb-8">Your intelligent travel companion for exploring India</p>
                    <button 
                        onClick={() => setCurrentPage('planner')}
                        className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
                    >
                        <i className="fas fa-plane-departure mr-2"></i>Plan Your Trip
                    </button>
                </div>
            );

            const PlannerPage = () => (
                <div className="container mx-auto p-8">
                    <h2 className="text-3xl font-bold text-white mb-6">Trip Planner</h2>
                    <div className="bg-slate-800 p-6 rounded-lg text-white">
                        <p>Trip planner content will go here</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <Navigation />
                    {currentPage === 'home' && <HomePage />}
                    {currentPage === 'planner' && <PlannerPage />}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
